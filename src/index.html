<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Playlist Downloader</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <div class="header">
        <h1 data-i18n="appTitle">YouTube Playlist Downloader</h1>
        <div class="header-right">
          <select class="lang-select" id="lang">
            <option value="vi" selected>Tiếng Việt</option>
            <option value="en">English</option>
            <option value="ar">العربية</option>
            <option value="zh">中文</option>
            <option value="nl">Nederlands</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="he">עברית</option>
            <option value="it">Italiano</option>
            <option value="pl">Polski</option>
            <option value="pt">Português (BR)</option>
            <option value="ro">Română</option>
            <option value="ru">Русский</option>
            <option value="es">Español</option>
            <option value="tr">Türkçe</option>
          </select>
          <span class="ytdlp-status" id="ytdlp-status">Checking yt-dlp...</span>
        </div>
      </div>

      <!-- Settings -->
      <div class="settings">
        <!-- Download Mode Tabs -->
        <div class="field">
          <label>Mode</label>
          <div class="tabs">
            <button class="tab active" data-mode="playlist" data-i18n="tabPlaylist">Playlist</button>
            <button class="tab" data-mode="video" data-i18n="tabVideo">1 Video</button>
          </div>
        </div>

        <div class="mode-content active" id="mode-playlist">
          <div class="field">
            <label data-i18n="playlistUrl">Playlist URL</label>
            <input type="text" id="url" data-i18n-placeholder="urlPlaceholder" />
          </div>
        </div>
        <div class="mode-content" id="mode-video">
          <div class="field">
            <label data-i18n="videoUrl">Video URL</label>
            <input type="text" id="url-video" data-i18n-placeholder="videoUrlPlaceholder" />
          </div>
        </div>

        <!-- Access Type Tabs -->
        <div class="field">
          <label data-i18n="accessType">Access Type</label>
          <div class="tabs">
            <button class="tab active" data-tab="public" data-i18n="tabPublic">Public</button>
            <button class="tab" data-tab="private" data-i18n="tabPrivate">Private / Members-only</button>
          </div>
        </div>

        <div class="tab-content active" id="content-public">
          <div class="hint" data-i18n="publicHint">Public playlists don't require cookies.</div>
        </div>

        <div class="tab-content" id="content-private">
          <div class="cookie-steps">
            <div class="step">
              <span class="step-num">1</span>
              <span data-i18n="cookieStep1">Install <a href="https://chromewebstore.google.com/detail/get-cookiestxt-locally/cclelndahbckbenkjhflpdbgdldlbecc" target="_blank" class="link">Get cookies.txt LOCALLY</a> extension</span>
            </div>
            <div class="step">
              <span class="step-num">2</span>
              <span data-i18n="cookieStep2">Open <a href="https://www.youtube.com" target="_blank" class="link">youtube.com</a> and log in</span>
            </div>
            <div class="step">
              <span class="step-num">3</span>
              <span data-i18n="cookieStep3">Click the extension icon, then click <strong>Export</strong></span>
            </div>
            <div class="step">
              <span class="step-num">4</span>
              <span data-i18n="cookieStep4">Copy all content and paste below</span>
            </div>
          </div>
          <textarea id="cookie-text" data-i18n-placeholder="cookiePlaceholder" rows="5"></textarea>
        </div>

        <div class="field">
          <label data-i18n="saveTo">Save To</label>
          <div class="row-input">
            <input type="text" id="output" data-i18n-placeholder="outputPlaceholder" />
            <button class="btn-browse" id="btn-output" data-i18n="browse">Browse</button>
          </div>
        </div>

        <div class="field">
          <label data-i18n="videoQuality">Video Quality</label>
          <select id="quality">
            <option value="Best">Best</option>
            <option value="1080p">1080p</option>
            <option value="720p">720p</option>
            <option value="480p">480p</option>
          </select>
        </div>

        <div class="field">
          <label data-i18n="outputFormat">Output Format</label>
          <select id="format">
            <option value="mp4">MP4</option>
            <option value="mp3">MP3</option>
            <option value="webm">WebM</option>
            <option value="mkv">MKV</option>
            <option value="avi">AVI</option>
            <option value="flac">FLAC</option>
            <option value="wav">WAV</option>
            <option value="ogg">OGG</option>
            <option value="m4a">M4A</option>
          </select>
        </div>

        <div class="field">
          <label data-i18n="proxy">Proxy (optional)</label>
          <input type="text" id="proxy" placeholder="socks5://127.0.0.1:1080" />
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="auto-tag" checked />
          <span data-i18n="autoTag">Auto-tag (artist, title, genre)</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="comments-only" checked />
          <span data-i18n="commentsOnly">Include comments</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="inject-metadata" />
          <span data-i18n="injectMetadata">Inject metadata (thumbnail, artist, album)</span>
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="update-mode" />
          <span data-i18n="updateMode">Update mode (skip already downloaded)</span>
        </label>

        <div class="field">
          <label data-i18n="exportComments">Export comments</label>
          <select id="export-comments">
            <option value="" data-i18n="exportNone">None</option>
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
          </select>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="download-subs" />
          <span data-i18n="downloadSubs">Download subtitles</span>
        </label>

        <div class="sub-options" id="sub-options" style="display:none">
          <div class="field">
            <label data-i18n="subLangs">Subtitle language</label>
            <select id="sub-lang-select">
              <option value="all">All languages</option>
              <option value="en,vi" selected>English + Vietnamese</option>
              <option value="en">English</option>
              <option value="vi">Vietnamese</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="zh-Hans">Chinese (Simplified)</option>
              <option value="zh-Hant">Chinese (Traditional)</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="es">Spanish</option>
              <option value="pt">Portuguese</option>
              <option value="ru">Russian</option>
              <option value="th">Thai</option>
              <option value="id">Indonesian</option>
              <option value="en,vi,ja">EN + VI + JA</option>
              <option value="en,vi,ko">EN + VI + KO</option>
              <option value="custom" data-i18n="subLangCustom">Custom...</option>
            </select>
          </div>
          <div class="field sub-custom" id="sub-custom" style="display:none">
            <input type="text" id="sub-langs" value="en,vi" placeholder="en,vi,ja,ko..." />
          </div>
        </div>

        <button class="btn-start" id="btn-start" data-i18n="startDownload">Start Download</button>
        <button class="btn-redownload" id="btn-redownload" style="display:none" data-i18n="redownload">Redownload failed</button>
        <div class="btn-row">
          <button class="btn-stop" id="btn-stop" disabled data-i18n="stop">Stop</button>
          <button class="btn-clear" id="btn-clear" data-i18n="clear">Clear</button>
        </div>
      </div>

      <!-- Queue -->
      <div class="queue" id="queue">
        <div class="queue-empty" data-i18n="queueEmpty">Paste a playlist/video URL and click Start</div>
      </div>

      <!-- Log -->
      <div class="log-panel" id="log"></div>

      <!-- Footer -->
      <div class="footer">
        <div class="progress-bar">
          <div class="fill" id="progress-fill"></div>
        </div>
        <span class="stats" id="stats"></span>
        <button class="btn-folder" id="btn-folder" disabled data-i18n="openFolder">Open Folder</button>
      </div>
    </div>
  </body>
</html>
